<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB Racers - Travel Bug Racers</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 20px; }
        .hero { width: 100%; margin-bottom: 30px; background-color: #111827; box-shadow: 0 4px 18px rgba(0,0,0,0.35); }
        .hero img { width: 100%; height: auto; display: block; }
        table { width: 100%; border-collapse: collapse; background-color: #34495e; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 30px; }
        th, td { padding: 14px 18px; text-align: left; border-bottom: 1px solid #4a6278; }
        th { background-color: #e74c3c; color: white; font-weight: bold; }
        tr:hover { background-color: #3d566b; }
        .km { font-weight: bold; color: #2ecc71; }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
        #map { height: 500px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 30px; }
        .last-updated { text-align: center; font-style: italic; color: #bdc3c7; margin-bottom: 20px; }

        #track-container {
            position: relative; width: min(960px, 100%); aspect-ratio: 1536 / 1024; margin: 0 auto 30px auto;
            border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            background-size: contain; background-position: center; background-repeat: no-repeat;
            background-color: #111827;
        }
        .track-car {
            position: absolute; font-size: clamp(22px, 3.2vw, 30px); z-index: 10;
            transform: translate(-50%, -50%);
            text-shadow: 2px 2px 6px rgba(0,0,0,0.95);
        }
        .track-label { 
            position: absolute; background: rgba(15, 23, 42, 0.92); color: #f1f5f9;
            padding: 6px 12px; border-radius: 6px; font-size: 12.5px; white-space: nowrap;
            z-index: 20; box-shadow: 0 3px 10px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="images/banner.jpg" alt="TB Racers Banner">
    </div>

    <div class="container">
        <div class="last-updated">Last updated: <span id="last-updated">Loading...</span></div>

        <h2>Leaderboard</h2>
        <table id="leaderboard-table">
            <thead>
                <tr>
                    <th>#</th><th>Car</th><th>Owner</th><th>TB Reference</th><th>Cache</th><th>Distance (km)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h2>Track Positions</h2>
        <div id="track-container" style="background-image: url('images/TBtrack1.png');"></div>

        <h2>Live Map</h2>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="racing-line.js"></script>
    <script>
        function updateTrackPositions(racers) {
            const container = document.getElementById('track-container');
            container.innerHTML = '';

            if (typeof racingLine === 'undefined' || !Array.isArray(racingLine) || racingLine.length === 0) {
                console.error('racing-line.js is missing or racingLine is empty.');
                return;
            }

            const TRACK_IMAGE_WIDTH = 1536;
            const TRACK_IMAGE_HEIGHT = 1024;

            const maxDistance = Math.max(...racers.map(racer => racer.km || 0), 1);

            function getDisplayPoint(trackPoint) {
                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;

                const scale = Math.min(
                    containerWidth / TRACK_IMAGE_WIDTH,
                    containerHeight / TRACK_IMAGE_HEIGHT
                );

                const displayedWidth = TRACK_IMAGE_WIDTH * scale;
                const displayedHeight = TRACK_IMAGE_HEIGHT * scale;
                const offsetX = (containerWidth - displayedWidth) / 2;
                const offsetY = (containerHeight - displayedHeight) / 2;

                return {
                    x: offsetX + trackPoint[0] * scale,
                    y: offsetY + trackPoint[1] * scale
                };
            }

            function clamp(value, min, max) {
                return Math.max(min, Math.min(max, value));
            }

            racers.forEach((racer, index) => {
                const distance = racer.km || 0;
                const progress = maxDistance > 0 ? distance / maxDistance : 0;
                const pointIndex = Math.min(
                    Math.floor(progress * (racingLine.length - 1)),
                    racingLine.length - 1
                );

                const point = getDisplayPoint(racingLine[pointIndex]);

                // Push the car a little towards the inside/center of the track.
                // This fixes cars that sit too close to the outer edge on desktop and mobile.
                const trackCenter = {
                    x: container.clientWidth / 2,
                    y: container.clientHeight / 2
                };

                const inwardX = trackCenter.x - point.x;
                const inwardY = trackCenter.y - point.y;
                const inwardLength = Math.hypot(inwardX, inwardY) || 1;
                const inwardOffset = Math.max(6, Math.min(14, container.clientWidth * 0.018));

                // Small stagger along the racing line so cars with nearly identical positions do not fully overlap.
                const prevPoint = getDisplayPoint(racingLine[Math.max(pointIndex - 1, 0)]);
                const nextPoint = getDisplayPoint(racingLine[Math.min(pointIndex + 1, racingLine.length - 1)]);
                const tangentX = nextPoint.x - prevPoint.x;
                const tangentY = nextPoint.y - prevPoint.y;
                const tangentLength = Math.hypot(tangentX, tangentY) || 1;
                const stagger = (index - (racers.length - 1) / 2) * 8;

                const x = point.x
                    + (inwardX / inwardLength) * inwardOffset
                    + (tangentX / tangentLength) * stagger;
                const y = point.y
                    + (inwardY / inwardLength) * inwardOffset
                    + (tangentY / tangentLength) * stagger;

                const car = document.createElement('div');
                car.className = 'track-car';
                car.style.left = `${Math.round(x)}px`;
                car.style.top = `${Math.round(y)}px`;
                car.textContent = '🚗';
                container.appendChild(car);

                const label = document.createElement('div');
                label.className = 'track-label';
                label.innerHTML = `<strong>${racer.car || racer.name}</strong><br>${distance} km`;
                container.appendChild(label);

                const labelX = clamp(x + 35, 10, container.clientWidth - label.offsetWidth - 10);
                const labelY = clamp(y - 38, 10, container.clientHeight - label.offsetHeight - 10);
                label.style.left = `${Math.round(labelX)}px`;
                label.style.top = `${Math.round(labelY)}px`;
            });
        }


        function getCacheDisplay(racer) {
            if (racer.status === 'in_hands') {
                return racer.location || 'In the hands of a geocacher';
            }

            if (racer.cache) {
                return `<a href="https://www.geocaching.com/geocache/${racer.cache}" target="_blank">${racer.cache}</a>`;
            }

            return '-';
        }

        async function loadRaceData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/GamesAtTheGarage/TB-RACE/main/racers.json');
                const racers = await response.json();

                document.getElementById('last-updated').textContent = racers[0]?.last_updated 
                    ? new Date(racers[0].last_updated).toLocaleString() 
                    : 'Just now';

                const tbody = document.querySelector('#leaderboard-table tbody');
                tbody.innerHTML = '';
                racers.forEach((racer, i) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>#${i+1}</td>
                        <td>${racer.car || racer.name || 'Unknown'}</td>
                        <td>${racer.owner || ''}</td>
                        <td><a href="https://www.geocaching.com/track/details.aspx?tracker=${racer.reference}" target="_blank">${racer.reference}</a></td>
                        <td>${getCacheDisplay(racer)}</td>
                        <td class="km">${racer.km || 0} km</td>
                    `;
                    tbody.appendChild(row);
                });

                updateTrackPositions(racers);

                const map = L.map('map');
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);

                const markerBounds = [];

                racers.forEach(racer => {
                    if (racer.coordinates && racer.coordinates.length === 2) {
                        const icon = L.divIcon({className: 'car-marker', html: '🚗', iconSize: [56,56], iconAnchor: [28,28]});
                        L.marker(racer.coordinates, {icon}).addTo(map)
                            .bindPopup(`<strong>${racer.car || racer.name}</strong><br>${racer.km || 0} km`);

                        markerBounds.push(racer.coordinates);
                    }
                });

                if (markerBounds.length > 0) {
                    map.fitBounds(markerBounds, {
                        padding: [60, 60],
                        maxZoom: 9
                    });
                } else {
                    map.setView([50.5, 7], 5.5);
                }

            } catch (e) {
                console.error(e);
            }
        }

        window.onload = loadRaceData;
    </script>
</body>
</html>
