<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB Racers - Travel Bug Racers</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 30px;
        }
        .hero img {
            max-width: 100%;
            height: auto;
            max-height: 250px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #34495e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        th, td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid #4a6278;
        }
        th {
            background-color: #e74c3c;
            color: white;
            font-weight: bold;
        }
        tr:hover {
            background-color: #3d566b;
        }
        .km {
            font-weight: bold;
            color: #2ecc71;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        #map {
            height: 500px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .last-updated {
            text-align: center;
            font-style: italic;
            color: #bdc3c7;
            margin-bottom: 20px;
        }
   .car-marker {
    font-size: 28px;
    text-align: center;
    line-height: 32px;
    filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.4));
}
    </style>
</head>
<body>
    <div class="container">
        <!-- Banner only, no heading above it -->
        <div class="hero">
            <img src="images/banner.jpg" alt="TB Racers Banner" style="max-width: 100%; height: auto; max-height: 340px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        </div>

        <div class="last-updated">
            Last updated: <span id="last-updated">Loading...</span>
        </div>

        <h2>Leaderboard</h2>
        <table id="leaderboard-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Car</th>
                    <th>Owner</th>
                    <th>TB Reference</th>
                    <th>Cache</th>
                    <th>Distance (km)</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by JavaScript -->
            </tbody>
        </table>

        <h2>Live Map</h2>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        async function loadRaceData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/GamesAtTheGarage/TB-RACE/main/racers.json');
                const racers = await response.json();

                if (racers.length > 0 && racers[0].last_updated) {
                    document.getElementById('last-updated').textContent = new Date(racers[0].last_updated).toLocaleString();
                } else {
                    document.getElementById('last-updated').textContent = 'Just now';
                }

                const tbody = document.querySelector('#leaderboard-table tbody');
                tbody.innerHTML = '';

                racers.forEach((racer, index) => {
                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td>#${index + 1}</td>
                        <td>${racer.car || racer.name || 'Unknown'}</td>
                        <td>${racer.owner || ''}</td>
                        <td><a href="https://www.geocaching.com/track/details.aspx?tracker=${racer.reference}" target="_blank">${racer.reference}</a></td>
                        <td><a href="https://www.geocaching.com/geocache/${racer.cache}" target="_blank">${racer.cache || '-'}</a></td>
                        <td class="km">${racer.km || 0} km</td>
                    `;

                    tbody.appendChild(row);
                });

                const map = L.map('map').setView([50.5, 7], 5.5);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);

               racers.forEach(racer => {
    if (racer.coordinates && Array.isArray(racer.coordinates) && racer.coordinates.length === 2) {
        const lat = racer.coordinates[0];
        const lng = racer.coordinates[1];

        // Custom car marker using emoji
        const carIcon = L.divIcon({
            className: 'car-marker',
            html: '🚗',
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -16]
        });

        const marker = L.marker([lat, lng], { icon: carIcon }).addTo(map);
        marker.bindPopup(`
            <strong>${racer.car || racer.name}</strong><br>
            ${racer.location || ''}<br>
            <strong>${racer.km || 0} km</strong>
        `);
    }
});

            } catch (error) {
                console.error('Error loading race data:', error);
                document.getElementById('last-updated').textContent = 'Failed to load data';
            }
        }

        window.onload = loadRaceData;
    </script>
</body>
</html>
