<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TB Race - Travel Bug Race</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #2c3e50; color: #ecf0f1; }
    .hero img { max-width: 100%; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; background: #34495e; border-radius: 12px; overflow: hidden; }
    th, td { padding: 14px; text-align: left; }
    th { background: #e74c3c; color: white; }
    tr:hover { background: #3d566b; }
    .km { font-weight: bold; color: #2ecc71; }
    .link { color: #3498db; text-decoration: none; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="hero">
    <img src="images/banner.jpg" alt="TB Race Banner">
  </div>

  <p id="last-updated">Last updated: Loading...</p>

  <h2>🏆 Leaderboard</h2>
  <table id="leaderboard-table">
    <thead>
      <tr>
        <th>Position</th>
        <th>Car</th>
        <th>Owner</th>
        <th>TB Reference</th>
        <th>Cache Reference</th>
        <th>Distance Traveled</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>🗺️ Live Map</h2>
  <div id="map" style="height: 500px; border-radius: 16px;"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    async function loadRaceData() {
      try {
        // Load from GitHub directly
        const response = await fetch('https://raw.githubusercontent.com/GamesAtTheGarage/TB-RACE/main/racers.json');
        const racers = await response.json();

        document.getElementById('last-updated').textContent = 
          `Last updated: ${new Date(racers[0]?.last_updated).toLocaleString()}`;

        const tbody = document.querySelector('#leaderboard-table tbody');
        tbody.innerHTML = '';

        racers.forEach((racer, i) => {
          const tbLink = racer.reference ? `https://www.geocaching.com/track/details.aspx?tracker=${racer.reference}` : '#';
          const cacheLink = racer.cache ? `https://www.geocaching.com/geocache/${racer.cache}` : '#';

          const row = document.createElement('tr');
          row.innerHTML = `
            <td><strong>#${i+1}</strong></td>
            <td><strong>${racer.car}</strong></td>
            <td>${racer.owner}</td>
            <td><a href="${tbLink}" target="_blank" class="link">${racer.reference}</a></td>
            <td><a href="${cacheLink}" target="_blank" class="link">${racer.cache}</a></td>
            <td class="km">${racer.km || 0} km</td>
          `;
          tbody.appendChild(row);
        });

        // Map
        const map = L.map('map').setView([50.5, 7], 5.5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        racers.forEach(racer => {
          if (racer.coordinates && racer.coordinates.length === 2) {
            const lat = parseFloat(racer.coordinates[0]);
            const lon = parseFloat(racer.coordinates[1]);
            if (!isNaN(lat) && !isNaN(lon)) {
              L.marker([lat, lon]).addTo(map)
                .bindPopup(`<b>${racer.car}</b><br>${racer.location}<br><b>${racer.km} km</b>`);
            }
          }
        });

      } catch (error) {
        console.error("Error:", error);
      }
    }

    window.onload = loadRaceData;
  </script>
</body>
</html>
